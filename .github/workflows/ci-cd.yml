name: React Native CI

# on:
#   workflow_dispatch:

# on:
#   push:
#     branches:
#       - main
#       - develop

#   pull_request:
#     branches:
#       - main
#       - develop
on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # - name: Setup Ruby
      #   uses: ruby/setup-ruby@v1
      #   with:
      #     ruby-version: '3.4'
      #     bundler-cache: true

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Install Ruby Dependencies
        run: bundle install

      - name: Type Check
        run: yarn tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Check Formatting
        run: yarn prettier --check .

      - name: Generate Release Notes
        shell: bash
        run: |
          mkdir -p artifacts

          VERSION_NAME=$(grep VERSION_NAME android/version.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep VERSION_CODE android/version.properties | cut -d'=' -f2)

          cat > artifacts/release-notes.md <<EOF
          🚀 React Native Lab

          📅 Release Date
          $(date +"%d %b %Y %I:%M %p")

          📦 Version
          ${VERSION_NAME} (${VERSION_CODE})

          🌿 Branch
          ${{ github.head_ref }}

          📌 Pull Request
          ${{ github.event.pull_request.title }}

          👤 Author
          ${{ github.actor }}

          ----------------------------------------

          ${{ github.event.pull_request.body }}

          ----------------------------------------

          🤖 Built Automatically via GitHub Actions + Fastlane
          EOF

      - name: Create Firebase Service Account
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > secrets/firebase-service-account.json

      - name: Run Fastlane Android Development Workflow
        run: bundle exec fastlane android dev

      - name: Notify Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION_NAME=$(grep VERSION_NAME android/version.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep VERSION_CODE android/version.properties | cut -d'=' -f2)

          DATE=$(date +"%d %b %Y %I:%M %p")

          BRANCH="${{ github.head_ref }}"
          AUTHOR="${{ github.actor }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          payload=$(cat <<EOF
          {
            "text": "🚀 *New Android Build Uploaded to Firebase*",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 React Native Lab"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION_NAME} (${VERSION_CODE})"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${BRANCH}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Developer:*\n${AUTHOR}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Release Date:*\n${DATE}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Pull Request*\n${PR_TITLE}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${PR_BODY}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View GitHub Workflow"
                    },
                    "url": "${RUN_URL}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl \
            -X POST \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

      # - name: Run Tests
      # run: yarn test
