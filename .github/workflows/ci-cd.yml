name: React Native CI

# on:
#   workflow_dispatch:

# on:
#   push:
#     branches:
#       - main
#       - develop

#   pull_request:
#     branches:
#       - main
#       - develop
on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # - name: Setup Ruby
      #   uses: ruby/setup-ruby@v1
      #   with:
      #     ruby-version: '3.4'
      #     bundler-cache: true

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Install Ruby Dependencies
        run: bundle install

      - name: Type Check
        run: yarn tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Check Formatting
        run: yarn prettier --check .

      - name: Create Firebase Service Account
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > secrets/firebase-service-account.json

      - name: Run Fastlane Android Development Workflow
        run: bundle exec fastlane android dev

      # - name: Run Tests
      # run: yarn test
